<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img">
<title>Arquitectura objetivo multi-cama del Hito 2</title>
<desc>Cada cama tiene monitor y webcam que se conectan a una Raspberry; varias Raspberries publican video por RTSP y datos por MQTT al servidor, que sirve la web con una cuadricula de camas al navegador Windows.</desc>
<style>
text{font-family:'Helvetica Neue',Arial,sans-serif}
.ts{font-size:12px;fill:#555}
.th{font-size:13px;font-weight:500;fill:#1a1a1a}
.title{font-size:18px;font-weight:500;fill:#111}
.sub{font-size:12px;fill:#555}
.src{fill:#eef1f4;stroke:#9aa6b2;stroke-width:1}
.edge{fill:#e8f0fe;stroke:#3f76c4;stroke-width:1.5}
.srv{fill:#e2f3f0;stroke:#2a9d8f;stroke-width:1.5}
.view{fill:#fbf1dd;stroke:#d8a32c;stroke-width:1.5}
.arr{stroke:#444;stroke-width:1.5;fill:none}
.note{font-size:11px;fill:#888}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="300" fill="#ffffff"/>
<text x="40" y="30" class="title">Hito 2 — datos del monitor + video, multi-cama</text>
<text x="40" y="50" class="sub">Cada cama lleva su ID. Varias Raspberries publican al servidor; una sola web los reune.</text>

<text x="100" y="80" class="th" text-anchor="middle">cama-01</text>
<rect x="40" y="90" width="120" height="40" rx="8" class="src"/>
<text x="100" y="115" class="ts" text-anchor="middle">Monitor uMEC10</text>
<rect x="40" y="146" width="120" height="40" rx="8" class="src"/>
<text x="100" y="171" class="ts" text-anchor="middle">Webcam USB</text>
<text x="100" y="208" class="note" text-anchor="middle">x N camas por Pi</text>

<rect x="210" y="98" width="110" height="84" rx="10" class="edge"/>
<text x="265" y="128" class="th" text-anchor="middle">Raspberry</text>
<text x="265" y="148" class="ts" text-anchor="middle">edge-01</text>
<text x="265" y="167" class="ts" text-anchor="middle">1–2 monitores</text>
<text x="265" y="208" class="note" text-anchor="middle">+ mas Pi por sala</text>

<rect x="372" y="86" width="158" height="108" rx="10" class="srv"/>
<text x="451" y="112" class="th" text-anchor="middle">servidor · Gateway</text>
<text x="451" y="134" class="ts" text-anchor="middle">MediaMTX — video</text>
<text x="451" y="154" class="ts" text-anchor="middle">Mosquitto — MQTT</text>
<text x="451" y="174" class="ts" text-anchor="middle">web (Antigravity)</text>

<rect x="560" y="98" width="90" height="84" rx="10" class="view"/>
<text x="605" y="128" class="th" text-anchor="middle">Windows</text>
<text x="605" y="148" class="ts" text-anchor="middle">grid de</text>
<text x="605" y="166" class="ts" text-anchor="middle">camas</text>

<line class="arr" x1="160" y1="110" x2="210" y2="128" marker-end="url(#arrow)"/>
<text x="185" y="104" class="note" text-anchor="middle">datos</text>
<line class="arr" x1="160" y1="166" x2="210" y2="150" marker-end="url(#arrow)"/>
<text x="185" y="186" class="note" text-anchor="middle">video</text>

<line class="arr" x1="320" y1="140" x2="372" y2="140" marker-end="url(#arrow)"/>
<text x="346" y="126" class="note" text-anchor="middle">RTSP</text>
<text x="346" y="158" class="note" text-anchor="middle">MQTT</text>

<line class="arr" x1="530" y1="140" x2="560" y2="140" marker-end="url(#arrow)"/>
<text x="545" y="126" class="note" text-anchor="middle">WebRTC</text>
<text x="545" y="158" class="note" text-anchor="middle">MQTT-WS</text>

<line x1="40" y1="240" x2="640" y2="240" stroke="#cfcfcf" stroke-width="1"/>
<text x="40" y="260" class="th">cama-01 = mismo ID para video (/cama-01) y datos (vitales/cama-01)</text>
<text x="40" y="280" class="ts">El simulador produce el JSON hoy; el monitor real (HL7/PDS) lo produce despues, sin cambiar la web.</text>
</svg>
